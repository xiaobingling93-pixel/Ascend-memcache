## Meta service start-up url
## K8s meta service cluster master-standby high availability scenario: ClusterIP address
## Non-HA scenario: keep consistent with the same name configuration in mmc-meta.conf
ock.mmc.meta_service_url = tcp://127.0.0.1:5000

## Config store url, it will automatically modified to PodIP at Pod startup in HA scenario
## Keep consistent with the same name configuration in mmc-meta.conf
ock.mmc.local_service.config_store_url = tcp://127.0.0.1:6000

## Log level: debug, info, warn, error
ock.mmc.log_level = info

## The maximum supported rank count; once ranks are connected, no further modifications are allowed — a meta restart is required
ock.mmc.local_service.world_size = 256

## Data transfer protocol, 'host_rdma': rdma over host;'host_urma': rdma over host_ub; 'host_tcp': tcp over host; 'host_shm': shared memory over host; 'device_rdma': rdma over device; 'device_sdma': sdma over device
## host_rdma, host_urma and host_tcp need hcom: https://atomgit.com/openeuler/ubs-comm/tree/br_dev_container_20260228 ; host_shm does NOT need hcom
ock.mmc.local_service.protocol = host_rdma

## If the protocol is host_rdma, the ip needs to be set as RDMA network card ip. Use 'show_gids' command to query it
ock.mmc.local_service.hcom_url = tcp://127.0.0.1:7000

## HBM/DRAM space usage, configuration type supports 134217728, 2048KB/2048K, 200MB/200mb/200m, 2.5GB or 1TB, case-insensitive, the maximum value is 1TB
## The system automatically calculates and aligns upwards to 2MB (host_rdma, host_tcp or host_shm) or 1GB (device_sdma or device_rdma)
## In A3 environment all protocol should be aligned to 1GB, otherwise mmc init will fail
## After alignment, the HBM size and DRAM size cannot both be 0 at the same time
ock.mmc.local_service.dram.size = 1GB
# ock.mmc.local_service.hbm.size = 0

## The MAX size of `ock.mmc.local_service.dram.size` in all local processes
ock.mmc.local_service.max.dram.size = 64GB

## The MAX size of `ock.mmc.local_service.hbm.size` in all local processes
# ock.mmc.local_service.max.hbm.size = 0

## The total retry duration (retry interval is 200ms) when client requests meta service and the connection does not exist
## Default value is 0, means no-retry and return immediately, value range [0, 600000]
# ock.mmc.client.retry_milliseconds = 0
# ock.mmc.client.timeout.seconds = 60

## Read/write thread pool size, value range [1, 64]
ock.mmc.client.read_thread_pool.size = 32
ock.mmc.client.write_thread_pool.size = 4

## Read/write aggregate, num range [1, 131072]
ock.mmc.client.aggregate.io = true
ock.mmc.client.aggregate.num = 122

## UBS_IO configurations
# ock.mmc.ubs_io.enable = false

## the memory pool mode, optional: standard/expanded.
## - standard: the capacity is limited 32TB.
## - expanded: the capacity is limited 128TB.
# ock.mmc.local_service.memory.pool.mode = standard

